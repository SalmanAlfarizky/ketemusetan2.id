<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpellScript - Battle Typing</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Almendra:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'MedievalSharp', cursive;
            color: #333;
        }

        /* Container Utama sesuai Mockup */
        .game-wrapper {
            width: 100%;
            max-width: 420px;
            height: 750px;
            background-color: #7a766a; 
            border: 10px solid #222;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Header Logo & Brand */
        .game-header {
            background-color: #e0e0e0;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
        }

        .logos {
            display: flex;
            gap: 8px;
        }

        .logo-box {
            width: 35px;
            height: 22px;
            background: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            color: white;
            border-radius: 2px;
        }

        .brand-name {
            color: #00008b;
            font-weight: 900;
            font-family: 'Arial', sans-serif;
            letter-spacing: 1px;
            font-size: 14px;
        }

        /* Arena Game */
        .game-arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding-top: 30px;
        }

        .main-title {
            font-family: 'Almendra', serif;
            font-size: 3.5rem;
            color: #d4c59a;
            text-shadow: 4px 4px 0px #222;
            margin-bottom: 30px;
            z-index: 5;
        }

        /* Input & UI Box */
        .ui-panel {
            z-index: 10;
            text-align: center;
        }

        .input-box {
            background: #f0f0f0;
            border: 3px solid #fff;
            border-radius: 10px;
            padding: 12px;
            width: 220px;
            font-family: 'MedievalSharp', cursive;
            font-size: 1.2rem;
            margin-bottom: 15px;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-action {
            background: #fff;
            border: 2px solid #000;
            padding: 8px 30px;
            font-family: 'MedievalSharp', cursive;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-action:active {
            transform: scale(0.95);
        }

        .current-spell {
            background: #fff;
            padding: 10px 40px;
            border-radius: 8px;
            font-size: 1.5rem;
            margin-top: 20px;
            display: none; /* Muncul saat mulai */
        }

        /* Characters Section */
        .battle-stage {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 20px;
            margin-top: auto;
            margin-bottom: 100px; /* Jarak dari lantai */
            z-index: 5;
        }

        .hero {
            width: 110px;
            height: 160px;
            background: #2a2a2a;
            clip-path: polygon(50% 0%, 80% 10%, 100% 35%, 100% 70%, 80% 90%, 20% 90%, 0% 70%, 0% 35%, 20% 10%);
        }

        .boss {
            width: 130px;
            height: 200px;
            background: #b89c4d;
            clip-path: polygon(50% 0%, 90% 20%, 100% 50%, 90% 80%, 50% 100%, 10% 80%, 0% 50%, 10% 20%);
        }

        /* Health Bar */
        .health-ui {
            position: absolute;
            bottom: 130px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .heart {
            font-size: 24px;
            filter: drop-shadow(2px 2px 0 #000);
        }

        .bar-bg {
            width: 150px;
            height: 18px;
            background: #333;
            border: 2px solid #000;
        }

        .bar-fill {
            width: 75%;
            height: 100%;
            background: #7ca667;
        }

        /* Lantai / Floor */
        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background-color: #2c2c2c;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 2px, transparent 2px);
            background-size: 25px 25px;
            border-top: 5px solid #111;
        }

        /* Keyboard Mockup */
        .keyboard-mockup {
            background: #bdbebd;
            padding: 8px 4px;
            border-top: 1px solid #999;
        }

        .key-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 4px;
        }

        .key {
            background: #fff;
            color: #444;
            padding: 6px 0;
            width: 32px;
            text-align: center;
            border-radius: 4px;
            font-size: 12px;
            font-family: sans-serif;
            box-shadow: 0 2px 0 #888;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <header class="game-header">
            <div class="logos">
                <div class="logo-box">UNIV</div>
                <div class="logo-box">PROD</div>
            </div>
            <div class="brand-name">🐾 POLAR</div>
        </header>

        <main class="game-arena">
            <h1 class="main-title">SpellScript</h1>

            <div class="ui-panel" id="start-menu">
                <input type="text" placeholder="Name..." class="input-box">
                <br>
                <button class="btn-action" onclick="startGame()">start</button>
            </div>

            <div class="current-spell" id="spell-display">Leviosa</div>

            <div class="battle-stage">
                <div class="hero"></div>
                <div class="boss"></div>
            </div>

            <div class="health-ui">
                <div class="heart">❤️</div>
                <div class="bar-bg">
                    <div class="bar-fill"></div>
                </div>
            </div>

            <div class="floor"></div>
        </main>

        <footer class="keyboard-mockup">
            <div class="key-row">
                <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div>
                <div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
            </div>
            <div class="key-row">
                <div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div>
                <div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key">L</div>
            </div>
        </footer home>
    </div>

    <script>
        function startGame() {
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('spell-display').style.display = 'block';
            // Di sini nanti bisa ditambah logic game-nya
            console.log("Game Dimulai!");
        }
    </script>
</body>
</html>
