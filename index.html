<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spellscript Arena</title>
    <style>
        :root {
            --primary: #f1c40f;
            --bg: #0f0f0f;
            --card-bg: rgba(26, 26, 27, 0.9);
            --danger: #e74c3c;
            --success: #2ecc71;
            --text: #d1c1a1;
        }

        body {
            background-color: var(--bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-image 1.2s ease-in-out;
        }

        #game-container {
            background: var(--card-bg);
            padding: 30px;
            border: 1px solid #333;
            border-radius: 20px;
            width: 550px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 { color: var(--primary); letter-spacing: 8px; margin-bottom: 10px; }
        
        .menu-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; margin-bottom: 8px; opacity: 0.7; }

        input, select {
            width: 80%;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 30px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: var(--primary); color: #000; }

        /* Battle UI */
        .battle-view { display: flex; justify-content: space-around; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .hp-bar { height: 10px; background: #222; border-radius: 10px; overflow: hidden; margin: 5px 0; border: 1px solid #333; }
        .hp-fill { height: 100%; transition: width 0.4s ease; }
        .action-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .spell-box { background: #222; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .word-target { font-size: 16px; font-weight: bold; color: var(--primary); margin: 10px 0; min-height: 20px; font-family: monospace; }
        .log { font-size: 13px; height: 40px; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="login-screen">
        <h1>SPELLSCRIPT</h1>
        <div class="menu-group">
            <label>IDENTITAS KSATRIA</label>
            <input type="text" id="name-input" placeholder="Ketik namamu..." autocomplete="off">
        </div>
        
        <div class="menu-group">
            <label>PILIH TINGKAT KESULITAN</label>
            <select id="level-select">
                <option value="easy">LEVEL 1 - 2 (Mudah)</option>
                <option value="hard">LEVEL 3 (Sulit)</option>
            </select>
        </div>

        <button onclick="startGame()">MASUK ARENA</button>
        <div id="highscore-view" style="margin-top: 20px; font-size: 12px; color: #666;"></div>
    </div>

    <div id="game-screen" style="display: none;">
        <div class="battle-view">
            <div>
                <div id="p-name" style="font-weight: bold;">PLAYER</div>
                <div class="hp-bar"><div id="p-hp-fill" class="hp-fill" style="background: var(--success); width: 100%;"></div></div>
            </div>
            <div style="align-self: center;">VS</div>
            <div>
                <div style="font-weight: bold; color: var(--danger);">ARCH-WIZARD</div>
                <div class="hp-bar"><div id="e-hp-fill" class="hp-fill" style="background: var(--danger); width: 100%;"></div></div>
            </div>
        </div>

        <div id="battle-log" class="log">Bersiaplah...</div>

        <div class="action-zone">
            <div class="spell-box">
                <div style="font-size: 10px;">SERANGAN</div>
                <div id="atk-word" class="word-target"></div>
                <input type="text" id="atk-input" placeholder="ketik..." autocomplete="off">
            </div>
            <div class="spell-box">
                <div style="font-size: 10px;">PEMULIHAN</div>
                <div id="heal-word" class="word-target"></div>
                <input type="text" id="heal-input" placeholder="ketik..." autocomplete="off">
            </div>
        </div>
        <div style="margin-top: 20px;">SKOR: <span id="score-val">0</span></div>
    </div>
</div>

<script>
    // Database Kata sesuai gambar
    const wordBank = {
        easy: [
            'Ashes', 'Phoenix', 'Flame', 'Cinder', 'Spark', 'Fireball', 'Thunderclap', 'Rumbling', 'Static', 'Voltage',
            'Pegasus', 'Mana', 'Seance', 'Linger', 'Arcane', 'Sorcerer', 'Cleric', 'Enchant', 'Incantation', 'Necromancer',
            'Harpy', 'Dragon', 'Treasure', 'Knowledge', 'Grimoire', 'Eternal', 'Alchemy', 'Archive', 'Invent', 'Curse',
            'Hexblade', 'Cure', 'Oracle', 'Recover', 'Invigorate', 'Mending', 'Rejuvinate', 'Alleviate', 'Ameliorate', 'Scroll'
        ],
        hard: [
            'Determination', 'Love', 'Compassion', 'Cleanse', 'Purify', 'Bless', 'Kindness', 'Emotion', 'Connection', 'Family',
            'Trust', 'Bond', 'Repent', 'Home', 'Nostalgia', 'Faith', 'Reliance', 'Gentleness', 'Fortitude', 'Comfort'
        ]
    };

    let currentGameWords = [];
    let player = { name: "", hp: 100 };
    let enemy = { hp: 100 };
    let score = 0;
    let isActive = false;

    function startGame() {
        const name = document.getElementById('name-input').value;
        const level = document.getElementById('level-select').value;
        
        if(!name) return alert("Masukkan nama!");

        player.name = name;
        currentGameWords = wordBank[level]; // Ambil kata sesuai level yang dipilih
        
        document.getElementById('p-name').innerText = name.toUpperCase();
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';

        initBattle();
    }

    function initBattle() {
        isActive = true;
        refreshWords();
        // Musuh menyerang tiap 4 detik
        setInterval(() => {
            if(isActive) {
                player.hp -= 10;
                updateUI();
                checkDeath();
            }
        }, 4000);
    }

    function refreshWords() {
        document.getElementById('atk-word').innerText = currentGameWords[Math.floor(Math.random() * currentGameWords.length)];
        document.getElementById('heal-word').innerText = currentGameWords[Math.floor(Math.random() * currentGameWords.length)];
    }

    // Input handling
    document.getElementById('atk-input').addEventListener('input', function(e) {
        if(e.target.value.toLowerCase() === document.getElementById('atk-word').innerText.toLowerCase()) {
            enemy.hp -= 20;
            score += 10;
            e.target.value = "";
            refreshWords();
            updateUI();
            checkDeath();
        }
    });

    document.getElementById('heal-input').addEventListener('input', function(e) {
        if(e.target.value.toLowerCase() === document.getElementById('heal-word').innerText.toLowerCase()) {
            player.hp = Math.min(100, player.hp + 15);
            e.target.value = "";
            refreshWords();
            updateUI();
        }
    });

    function updateUI() {
        document.getElementById('p-hp-fill').style.width = player.hp + "%";
        document.getElementById('e-hp-fill').style.width = enemy.hp + "%";
        document.getElementById('score-val').innerText = score;
    }

    function checkDeath() {
        if(enemy.hp <= 0) {
            alert("KEMENANGAN!");
            location.reload();
        } else if(player.hp <= 0) {
            alert("KAMU GUGUR!");
            location.reload();
        }
    }
</script>
</body>
</html>
