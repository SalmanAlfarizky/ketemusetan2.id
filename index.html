<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spellscript - Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="hero-page" class="full-page">
        <header class="top-nav">
            <div class="logos">
                <img src="logo-kuning.png" alt="Logo 1" class="small-logo">
                <img src="logo-ox.png" alt="Logo 2" class="small-logo">
            </div>
            <div class="brand-polar">POLAR</div>
        </header>

        <div class="game-container">
            <h1 class="game-title">Spellscript</h1>
            <div class="input-group">
                <input type="text" id="playerName" placeholder="Name..." autofocus>
                <button id="startButton">start</button>
            </div>
        </div>
        
        <div class="scroll-hint">Scroll down for info</div>
    </section>

    <section id="info-page" class="full-page dark-gradient">
        <div class="ox-content">
            <img src="ox-logo-white.png" alt="OX-Laboratory" class="main-logo">
            <h2>OX-LABORATORY</h2>
            
            <div class="footer-links">
                <div class="col">
                    <h3>Media Production UI</h3>
                    <ul>
                        <li><span class="box"></span> link-production.com</li>
                        <li><span class="box"></span> Gedung Creative Center, Tokyo</li>
                    </ul>
                </div>
                <div class="col">
                    <h3>Contact Information</h3>
                    <ul>
                        <li><span class="box"></span> lab-press@mail.id</li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <script>
        const input = document.getElementById('playerName');
        const btn = document.getElementById('startButton');

        // Fungsi untuk pindah slide
        function goToNextSlide() {
            document.getElementById('info-page').scrollIntoView({ behavior: 'smooth' });
        }

        // Klik tombol start
        btn.addEventListener('click', goToNextSlide);

        // Tekan Enter di keyboard
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                goToNextSlide();
            }
        });
    </script>
</body>
</html>
