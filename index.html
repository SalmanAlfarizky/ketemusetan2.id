<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spellscript: Tactical Battle</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #d1c1a1;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            background: #1a1a1b;
            padding: 30px;
            border: 3px solid #3e3e3e;
            border-radius: 8px;
            width: 500px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            text-align: center;
        }

        /* Menu Login */
        #login-screen { display: flex; flex-direction: column; gap: 15px; }

        /* Layar Utama */
        #game-screen { display: none; }

        .battle-view {
            display: flex;
            justify-content: space-between;
            background: #111;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .hp-container { width: 120px; }
        .hp-bar { height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin: 8px 0; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.5s ease; }
        .player-hp { background: #2ecc71; }
        .enemy-hp { background: #e74c3c; }

        .action-zone {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .spell-box {
            background: #252526;
            padding: 15px;
            border: 1px solid #444;
            border-radius: 4px;
        }

        .label { font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .word-target { font-size: 18px; font-weight: bold; color: #f1c40f; margin-bottom: 10px; min-height: 22px; }

        input {
            width: 80%;
            padding: 8px;
            background: #111;
            border: 1px solid #555;
            color: #fff;
            text-align: center;
            font-family: inherit;
        }

        input:focus { border-color: #f1c40f; outline: none; }

        .log {
            font-size: 13px;
            height: 40px;
            margin: 15px 0;
            color: #aaa;
            font-style: italic;
        }

        #highscore-view { font-size: 12px; margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        
        button {
            padding: 10px 20px;
            background: #3e3e3e;
            color: #fff;
            border: 1px solid #555;
            cursor: pointer;
        }
        button:hover { background: #4e4e4e; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="login-screen">
        <h1 style="color:#f1c40f; letter-spacing: 5px;">SPELLSCRIPT</h1>
        <p>IDENTITAS KSATRIA:</p>
        <input type="text" id="name-input" placeholder="Ketik namamu..." autocomplete="off">
        <button onclick="startGame()">MASUK ARENA</button>
        <div id="highscore-view"></div>
    </div>

    <div id="game-screen">
        <div class="battle-view">
            <div class="hp-container">
                <div id="p-name" style="font-size:12px">PLAYER</div>
                <div class="hp-bar"><div id="p-hp-fill" class="hp-fill player-hp"></div></div>
                <div id="p-hp-text" style="font-size:10px">100/100</div>
            </div>
            <div style="align-self:center; color:#444">VS</div>
            <div class="hp-container">
                <div style="font-size:12px">ARCH-WIZARD</div>
                <div class="hp-bar"><div id="e-hp-fill" class="hp-fill enemy-hp"></div></div>
                <div id="e-hp-text" style="font-size:10px">100/100</div>
            </div>
        </div>

        <div id="battle-log" class="log">Bersiaplah...</div>

        <div class="action-zone">
            <div class="spell-box">
                <div class="label">⚔️ SERANG (ATK)</div>
                <div id="atk-word" class="word-target"></div>
                <input type="text" id="atk-input" placeholder="ketik..." autocomplete="off">
            </div>
            <div class="spell-box">
                <div class="label">🧪 PULIH (HEAL)</div>
                <div id="heal-word" class="word-target"></div>
                <input type="text" id="heal-input" placeholder="ketik..." autocomplete="off">
            </div>
        </div>

        <div style="margin-top: 20px;">
            Skor: <span id="score-val">0</span>
        </div>
        <button id="btn-menu" style="display:none; margin-top:15px;" onclick="location.reload()">MENU UTAMA</button>
    </div>
</div>

<script>
    let player = { name: "", hp: 100, maxHp: 100 };
    let enemy = { hp: 100, maxHp: 100 };
    let score = 0;
    let isActive = false;
    let enemyActionTimer;

    // Kata-kata yang lebih kompleks
    const complexWords = [
        'transformasi', 'implementasi', 'sinkronisasi', 'akomodasi', 'karakteristik', 
        'spesialisasi', 'dokumentasi', 'fundamental', 'interpretasi', 'konvensional',
        'metamorfosis', 'revolusioner', 'kategorisasi', 'infrastruktur', 'multidimensional',
        'standardisasi', 'dekonstruksi', 'probabilitas', 'signifikansi', 'akreditasi'
    ];

    window.onload = loadLeaderboard;

    function startGame() {
        const name = document.getElementById('name-input').value;
        if(!name) return alert("Isi namamu!");
        
        player.name = name;
        document.getElementById('p-name').innerText = name.toUpperCase();
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        initBattle();
    }

    function initBattle() {
        player.hp = 100;
        enemy.hp = 100;
        score = 0;
        isActive = true;
        updateUI();
        refreshWords();
        
        document.getElementById('atk-input').focus();
        
        // Musuh bertindak setiap 4 detik
        if(enemyActionTimer) clearInterval(enemyActionTimer);
        enemyActionTimer = setInterval(enemyTurn, 4000);
    }

    function refreshWords() {
        document.getElementById('atk-word').innerText = complexWords[Math.floor(Math.random()*complexWords.length)];
        document.getElementById('heal-word').innerText = complexWords[Math.floor(Math.random()*complexWords.length)];
    }

    // Input Serang
    document.getElementById('atk-input').addEventListener('input', function(e) {
        if(!isActive) return;
        if(e.target.value.toLowerCase() === document.getElementById('atk-word').innerText) {
            let dmg = 20;
            enemy.hp -= dmg;
            score += 15;
            logAction(`Kamu menyerang! Musuh -${dmg} HP`);
            finalizeTurn(e.target);
        }
    });

    // Input Heal
    document.getElementById('heal-input').addEventListener('input', function(e) {
        if(!isActive) return;
        if(e.target.value.toLowerCase() === document.getElementById('heal-word').innerText) {
            let heal = 15;
            player.hp = Math.min(player.maxHp, player.hp + heal);
            logAction(`Kamu menggunakan ramuan! +${heal} HP`);
            finalizeTurn(e.target);
        }
    });

    function finalizeTurn(inputEl) {
        inputEl.value = "";
        refreshWords();
        updateUI();
        checkDeath();
    }

    function enemyTurn() {
        if(!isActive) return;

        // Logika AI Musuh: Jika HP musuh < 40%, ada peluang 50% dia heal
        if(enemy.hp < 40 && Math.random() > 0.5) {
            let heal = 10;
            enemy.hp = Math.min(enemy.maxHp, enemy.hp + heal);
            logAction("Musuh merapal mantra pemulih! +10 HP");
        } else {
            let dmg = 12;
            player.hp -= dmg;
            logAction(`Musuh menyerangmu! -${dmg} HP`);
        }
        updateUI();
        checkDeath();
    }

    function updateUI() {
        document.getElementById('p-hp-fill').style.width = player.hp + "%";
        document.getElementById('e-hp-fill').style.width = enemy.hp + "%";
        document.getElementById('p-hp-text').innerText = `${Math.max(0, player.hp)}/${player.maxHp}`;
        document.getElementById('e-hp-text').innerText = `${Math.max(0, enemy.hp)}/${enemy.maxHp}`;
        document.getElementById('score-val').innerText = score;
    }

    function logAction(msg) {
        document.getElementById('battle-log').innerText = msg;
    }

    function checkDeath() {
        if(enemy.hp <= 0) {
            isActive = false;
            clearInterval(enemyActionTimer);
            logAction("VICTORY! Musuh telah musnah.");
            saveScore();
            endGame();
        } else if(player.hp <= 0) {
            isActive = false;
            clearInterval(enemyActionTimer);
            logAction("DEFEAT... Kamu tumbang di medan perang.");
            saveScore();
            endGame();
        }
    }

    function endGame() {
        document.getElementById('atk-input').disabled = true;
        document.getElementById('heal-input').disabled = true;
        document.getElementById('btn-menu').style.display = 'inline-block';
    }

    function saveScore() {
        let scores = JSON.parse(localStorage.getItem('spellscript_scores')) || [];
        scores.push({name: player.name, score: score});
        scores.sort((a,b) => b.score - a.score);
        localStorage.setItem('spellscript_scores', JSON.stringify(scores.slice(0, 5)));
    }

    function loadLeaderboard() {
        let scores = JSON.parse(localStorage.getItem('spellscript_scores')) || [];
        let html = "<b>TOP 5 KSATRIA:</b><br>";
        scores.forEach((s, i) => {
            html += `${i+1}. ${s.name} - ${s.score}<br>`;
        });
        document.getElementById('highscore-view').innerHTML = html;
    }
</script>

</body>
</html>
