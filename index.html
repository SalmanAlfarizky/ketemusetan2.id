<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spellscript - Typing Battle</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0d8c3;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            text-align: center;
            background: #2b2b2b;
            padding: 30px;
            border: 4px solid #4a3f35;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .battle-area {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 20px 0;
            border-bottom: 2px solid #4a3f35;
        }

        .character {
            font-size: 50px;
        }

        .hp-bar {
            width: 100%;
            height: 10px;
            background: #444;
            margin-top: 5px;
        }

        .hp-fill {
            height: 100%;
            background: #e74c3c;
            width: 100%;
            transition: width 0.3s;
        }

        #word-display {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 20px 0;
            color: #f1c40f;
            text-shadow: 2px 2px #000;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            font-size: 18px;
            background: #3d3d3d;
            border: 2px solid #4a3f35;
            color: white;
            text-align: center;
            outline: none;
        }

        .stats {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }

        #message {
            margin-top: 10px;
            font-weight: bold;
            height: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="battle-area">
        <div id="player-side">
            <div class="character">⚔️</div>
            <div style="font-size: 12px;">PLAYER</div>
            <div class="hp-bar"><div id="player-hp" class="hp-fill"></div></div>
        </div>
        <div id="enemy-side">
            <div class="character">👹</div>
            <div style="font-size: 12px;">ENEMY</div>
            <div class="hp-bar"><div id="enemy-hp" class="hp-fill"></div></div>
        </div>
    </div>

    <div id="word-display">Tekan Start!</div>
    <input type="text" id="input-word" placeholder="Ketik di sini..." disabled>
    
    <div id="message"></div>
    
    <button id="start-btn" style="margin-top: 20px; padding: 10px 20px; cursor: pointer;">Mulai Game</button>

    <div class="stats">
        Skor: <span id="score">0</span>
    </div>
</div>

<script>
    const wordDisplay = document.getElementById('word-display');
    const inputWord = document.getElementById('input-word');
    const startBtn = document.getElementById('start-btn');
    const scoreDisplay = document.getElementById('score');
    const enemyHpBar = document.getElementById('enemy-hp');
    const playerHpBar = document.getElementById('player-hp');
    const message = document.getElementById('message');

    const words = ['januari', 'februari', 'maret', 'april', 'mei', 'juni', 'juli', 'agustus', 'september', 'oktober', 'november', 'desember', 'pedang', 'sihir', 'ksatria', 'naga', 'istana', 'hutan'];
    
    let score = 0;
    let enemyHp = 100;
    let playerHp = 100;
    let currentWord = '';
    let gameActive = false;
    let enemyInterval;

    function startGame() {
        score = 0;
        enemyHp = 100;
        playerHp = 100;
        gameActive = true;
        scoreDisplay.innerText = score;
        updateHpBars();
        inputWord.disabled = false;
        inputWord.value = '';
        inputWord.focus();
        startBtn.style.display = 'none';
        message.innerText = '';
        nextWord();
        
        // Musuh menyerang setiap 3 detik jika kita tidak mengetik
        enemyInterval = setInterval(enemyAttack, 3000);
    }

    function nextWord() {
        const randomIndex = Math.floor(Math.random() * words.length);
        currentWord = words[randomIndex];
        wordDisplay.innerText = currentWord;
    }

    function enemyAttack() {
        if (!gameActive) return;
        playerHp -= 10;
        updateHpBars();
        message.innerText = 'Musuh menyerang! -10 HP';
        message.style.color = '#e74c3c';
        checkGameOver();
    }

    inputWord.addEventListener('input', () => {
        if (inputWord.value.toLowerCase() === currentWord) {
            score += 10;
            enemyHp -= 15;
            scoreDisplay.innerText = score;
            inputWord.value = '';
            message.innerText = 'Serangan berhasil!';
            message.style.color = '#2ecc71';
            updateHpBars();
            checkGameOver();
            if (gameActive) nextWord();
        }
    });

    function updateHpBars() {
        enemyHpBar.style.width = enemyHp + '%';
        playerHpBar.style.width = playerHp + '%';
    }

    function checkGameOver() {
        if (enemyHp <= 0) {
            endGame('MENANG! Musuh kalah.');
        } else if (playerHp <= 0) {
            endGame('KALAH! HP kamu habis.');
        }
    }

    function endGame(msg) {
        gameActive = false;
        clearInterval(enemyInterval);
        inputWord.disabled = true;
        wordDisplay.innerText = 'Game Over';
        message.innerText = msg;
        startBtn.style.display = 'inline-block';
        startBtn.innerText = 'Main Lagi';
    }

    startBtn.addEventListener('click', startGame);
</script>

</body>
</html>
