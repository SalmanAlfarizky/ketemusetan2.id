<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpellScript Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        /* Container HP Mockup */
        .phone-container {
            width: 360px;
            height: 640px;
            background-color: #7a766a; /* Warna dasar mockup */
            border: 8px solid #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header (Tetap di atas) */
        .game-header {
            height: 60px;
            background: #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 10;
        }

        .header-logos { display: flex; gap: 5px; }
        .logo-img { width: 35px; height: 25px; object-fit: contain; background: #ccc; }
        .polar-logo { width: 60px; height: 20px; object-fit: contain; }

        /* Halaman */
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            height: 100%;
            position: relative;
        }

        .active { display: flex; }

        /* Page 1: Home */
        .title-img {
            width: 80%;
            margin-top: 40px;
            object-fit: contain;
        }

        .input-area {
            margin-top: 20px;
            text-align: center;
            z-index: 5;
        }

        .input-field {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 180px;
            margin-bottom: 10px;
        }

        .btn-start {
            padding: 8px 25px;
            cursor: pointer;
            background: #fff;
            border: 1px solid #000;
        }

        /* Page 2: Battle */
        .spell-img {
            width: 150px;
            margin-top: 40px;
            object-fit: contain;
        }

        .battle-arena {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            margin-top: auto;
            margin-bottom: 100px;
            padding: 0 20px;
            z-index: 5;
        }

        .char-img { height: 140px; object-fit: contain; }

        /* Health Bar */
        .hp-container {
            position: absolute;
            bottom: 120px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 5;
        }

        .heart-icon { width: 25px; }
        .hp-bar { width: 120px; height: 12px; background: #333; border: 1px solid #000; }
        .hp-fill { width: 70%; height: 100%; background: #7ca667; }

        /* Lantai & Background */
        .floor-img {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            object-fit: cover;
        }

        /* Keyboard (Hanya di Page 2) */
        .keyboard-img {
            width: 100%;
            height: auto;
            background: #999;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <header class="game-header">
            <div class="header-logos">
                <img src="logo1.png" alt="Logo 1" class="logo-img">
                <img src="logo2.png" alt="Logo 2" class="logo-img">
            </div>
            <img src="polar.png" alt="POLAR" class="polar-logo">
        </header>

        <div id="page-home" class="page active">
            <img src="judul_spellscript.png" alt="SpellScript Title" class="title-img">
            
            <div class="input-area">
                <input type="text" placeholder="Name..." class="input-field">
                <br>
                <button class="btn-start" onclick="goToPage('page-battle')">start</button>
            </div>

            <img src="char_hero_idle.png" alt="Hero" class="char-img" style="position: absolute; bottom: 80px;">
            <img src="lantai.png" alt="Lantai" class="floor-img">
        </div>

        <div id="page-battle" class="page">
            <img src="mantra_leviosa.png" alt="Leviosa" class="spell-img">

            <div class="battle-arena">
                <img src="hero_battle.png" alt="Hero" class="char-img">
                <img src="enemy_boss.png" alt="Boss" class="char-img">
            </div>

            <div class="hp-container">
                <img src="heart.png" alt="HP" class="heart-icon">
                <div class="hp-bar">
                    <div class="hp-fill"></div>
                </div>
            </div>

            <img src="lantai.png" alt="Lantai" class="floor-img" style="bottom: 160px;">
            
            <div style="margin-top: auto; width: 100%;">
                <img src="keyboard.png" alt="Keyboard" class="keyboard-img">
            </div>
        </div>
    </div>

    <script>
        function goToPage(pageId) {
            // Sembunyikan semua page
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Tampilkan page yang dituju
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
