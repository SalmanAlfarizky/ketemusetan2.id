<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spellscript Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5d4037; /* Coklat Tua */
            --accent: #d4a373; /* Coklat Muda Keemasan */
            --parchment: #f4e1d2; /* Warna Kertas Kuno */
            --bg: #2b1d0e;
            --danger: #8b0000;
            --success: #2e7d32;
            --text: #3e2723;
        }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://www.transparenttextures.com/patterns/papyrus.png');
            background-size: cover;
            color: var(--text);
            font-family: 'MedievalSharp', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Leaderboard Toggle System */
        #leaderboard-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            text-align: right;
        }

        #leaderboard-content {
            background: var(--parchment);
            padding: 15px;
            border: 3px double var(--primary);
            border-radius: 5px;
            width: 200px;
            display: none; /* Awalnya tertutup */
            margin-top: 10px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            text-align: left;
        }

        .toggle-btn {
            background: var(--primary);
            color: var(--parchment);
            border: 1px solid var(--accent);
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            border-radius: 4px;
        }

        #game-container {
            background: var(--parchment);
            padding: 30px;
            border: 10px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/dark-matter.png') 30 round;
            outline: 2px solid var(--primary);
            width: 550px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
        }

        h1 { 
            font-family: 'Cinzel', serif;
            color: var(--primary); 
            text-transform: uppercase;
            letter-spacing: 4px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            margin-bottom: 20px;
        }

        input, select {
            width: 85%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid var(--primary);
            color: var(--text);
            font-family: 'MedievalSharp', cursive;
            text-align: center;
            margin-bottom: 15px;
        }

        button.main-btn {
            font-family: 'Cinzel', serif;
            padding: 12px 35px;
            background: var(--primary);
            color: var(--parchment);
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button.main-btn:hover {
            background: var(--accent);
            color: var(--primary);
        }

        .battle-view { 
            display: flex; 
            justify-content: space-around; 
            background: rgba(0,0,0,0.05); 
            padding: 20px; 
            border: 1px dashed var(--primary);
        }

        .hp-bar { 
            height: 12px; 
            background: #d7ccc8; 
            border: 1px solid var(--primary); 
        }

        .hp-fill { height: 100%; transition: width 0.5s ease; }

        .word-target { 
            font-size: 20px; 
            color: var(--danger); 
            margin: 10px 0; 
            font-weight: bold;
        }

        .spell-box { 
            background: rgba(255, 255, 255, 0.5); 
            border: 1px solid var(--primary);
            padding: 10px;
        }
    </style>
</head>
<body>

<div id="leaderboard-wrapper">
    <button class="toggle-btn" onclick="toggleLeaderboard()">📜 SKOR TERBAIK</button>
    <div id="leaderboard-content">
        <div style="font-family: 'Cinzel'; font-weight: bold; border-bottom: 1px solid var(--primary); margin-bottom: 8px;">TOP SORCERERS</div>
        <div id="leader-list"></div>
    </div>
</div>

<div id="game-container">
    <div id="login-screen">
        <h1>SPELLSCRIPT</h1>
        <p style="font-size: 12px; font-style: italic;">"Tuliskan takdirmu pada gulungan ini."</p>
        <input type="text" id="name-input" placeholder="Nama Sang Ksatria..." autocomplete="off">
        <select id="level-select">
            <option value="easy">TINGKAT I: DASAR ELEMEN</option>
            <option value="hard">TINGKAT II: RITUAL KUNO</option>
        </select>
        <br>
        <button class="main-btn" onclick="startGame()">MULAI RITUAL</button>
    </div>

    <div id="game-screen" style="display: none;">
        <div class="battle-view">
            <div>
                <div id="p-name" style="font-size: 12px; font-weight: bold;">PLAYER</div>
                <div class="hp-bar" style="width: 160px;"><div id="p-hp-fill" class="hp-fill" style="background: var(--success); width: 100%;"></div></div>
            </div>
            <div style="align-self: center; font-family: 'Cinzel';">VS</div>
            <div>
                <div style="font-size: 12px; font-weight: bold; color: var(--danger);">ARCH-WIZARD</div>
                <div class="hp-bar" style="width: 160px;"><div id="e-hp-fill" class="hp-fill" style="background: var(--danger); width: 100%;"></div></div>
            </div>
        </div>

        <div id="battle-log" style="height: 35px; font-size: 12px; margin: 10px 0; font-style: italic;">Siapkan tinta dan kekuatanmu...</div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="spell-box">
                <div style="font-size: 10px; text-transform: uppercase;">Mantra Serang</div>
                <div id="atk-word" class="word-target"></div>
                <input type="text" id="atk-input" placeholder="..." style="width: 80%;">
            </div>
            <div class="spell-box">
                <div style="font-size: 10px; text-transform: uppercase;">Mantra Pulih</div>
                <div id="heal-word" class="word-target"></div>
                <input type="text" id="heal-input" placeholder="..." style="width: 80%;">
            </div>
        </div>
        <div style="margin-top: 20px;">MANA: <span id="score-val">0</span></div>
    </div>
</div>

<script>
    const wordBank = {
        easy: ['Ashes', 'Phoenix', 'Flame', 'Cinder', 'Spark', 'Fireball', 'Thunderclap', 'Rumbling', 'Static', 'Voltage', 'Pegasus', 'Mana', 'Seance', 'Linger', 'Arcane', 'Sorcerer', 'Cleric', 'Enchant', 'Incantation', 'Necromancer', 'Harpy', 'Dragon', 'Treasure', 'Knowledge', 'Grimoire', 'Eternal', 'Alchemy', 'Archive', 'Invent', 'Curse', 'Hexblade', 'Cure', 'Oracle', 'Recover', 'Invigorate', 'Mending', 'Rejuvinate', 'Alleviate', 'Ameliorate', 'Scroll'],
        hard: ['Determination', 'Love', 'Compassion', 'Cleanse', 'Purify', 'Bless', 'Kindness', 'Emotion', 'Connection', 'Family', 'Trust', 'Bond', 'Repent', 'Home', 'Nostalgia', 'Faith', 'Reliance', 'Gentleness', 'Fortitude', 'Comfort']
    };

    const dummyLeaders = [
        { name: "Salma", score: 850 }, { name: "Tasya", score: 720 }, { name: "Kaye", score: 640 }, { name: "Arkan", score: 510 }, { name: "Zack", score: 430 }
    ];

    let currentGameWords = [], score = 0, isActive = false;
    let player = { hp: 100 }, enemy = { hp: 100 };

    window.onload = () => {
        document.getElementById('leader-list').innerHTML = dummyLeaders.map((l, i) => 
            `<div style="display:flex; justify-content:space-between; font-size:12px;"><span>${i+1}. ${l.name}</span><span>${l.score}</span></div>`
        ).join('');
    };

    function toggleLeaderboard() {
        const content = document.getElementById('leaderboard-content');
        content.style.display = content.style.display === 'block' ? 'none' : 'block';
    }

    function startGame() {
        const name = document.getElementById('name-input').value;
        if(!name) return alert("Siapa namamu, Penyair?");
        currentGameWords = wordBank[document.getElementById('level-select').value];
        document.getElementById('p-name').innerText = name.toUpperCase();
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        initBattle();
    }

    function initBattle() {
        isActive = true;
        refreshWords();
        document.getElementById('atk-input').focus();
        setInterval(() => { if(isActive) { player.hp -= 8; updateUI(); checkDeath(); } }, 4500);
    }

    function refreshWords() {
        document.getElementById('atk-word').innerText = currentGameWords[Math.floor(Math.random() * currentGameWords.length)];
        document.getElementById('heal-word').innerText = currentGameWords[Math.floor(Math.random() * currentGameWords.length)];
    }

    document.getElementById('atk-input').addEventListener('input', (e) => {
        if(e.target.value.toLowerCase() === document.getElementById('atk-word').innerText.toLowerCase()) {
            enemy.hp -= 20; score += 15;
            e.target.value = ""; refreshWords(); updateUI(); checkDeath();
        }
    });

    document.getElementById('heal-input').addEventListener('input', (e) => {
        if(e.target.value.toLowerCase() === document.getElementById('heal-word').innerText.toLowerCase()) {
            player.hp = Math.min(100, player.hp + 12);
            e.target.value = ""; refreshWords(); updateUI();
        }
    });

    function updateUI() {
        document.getElementById('p-hp-fill').style.width = player.hp + "%";
        document.getElementById('e-hp-fill').style.width = enemy.hp + "%";
        document.getElementById('score-val').innerText = score;
    }

    function checkDeath() {
        if(enemy.hp <= 0 || player.hp <= 0) {
            isActive = false;
            alert(enemy.hp <= 0 ? "Kemenangan Menantimu!" : "Gulunganmu Terbakar...");
            location.reload();
        }
    }
</script>
</body>
</html>
