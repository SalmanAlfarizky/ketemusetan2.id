<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spellscript Arena</title>
    <style>
        :root {
            --primary: #f1c40f;
            --bg: #0f0f0f;
            --card-bg: rgba(26, 26, 27, 0.9);
            --danger: #e74c3c;
            --success: #2ecc71;
            --text: #d1c1a1;
        }

        body {
            background-color: var(--bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-image 1.2s ease-in-out;
        }

        #game-container {
            background: var(--card-bg);
            padding: 30px;
            border: 1px solid #333;
            border-radius: 20px;
            width: 550px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 2;
        }

        /* Leaderboard Pojok Kanan Atas */
        #leaderboard-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 20, 0.8);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #444;
            width: 180px;
            font-size: 11px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .leader-title {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 2px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .leader-entry {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
            opacity: 0.8;
        }

        h1 { color: var(--primary); letter-spacing: 8px; margin-bottom: 10px; }
        
        .menu-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; margin-bottom: 8px; opacity: 0.7; }

        input, select {
            width: 80%;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 30px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: var(--primary); color: #000; transform: translateY(-2px); }

        /* Battle UI */
        .battle-view { display: flex; justify-content: space-around; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .hp-bar { height: 10px; background: #222; border-radius: 10px; overflow: hidden; margin: 5px 0; border: 1px solid #333; }
        .hp-fill { height: 100%; transition: width 0.4s ease; }
        .action-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .spell-box { background: #222; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .word-target { font-size: 15px; font-weight: bold; color: var(--primary); margin: 10px 0; min-height: 20px; font-family: monospace; }
        .log { font-size: 12px; height: 35px; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div id="leaderboard-overlay">
    <div class="leader-title">TOP KSATRIA</div>
    <div id="leader-list">
        </div>
</div>

<div id="game-container">
    <div id="login-screen">
        <h1>SPELLSCRIPT</h1>
        <div class="menu-group">
            <label>IDENTITAS KSATRIA</label>
            <input type="text" id="name-input" placeholder="Ketik namamu..." autocomplete="off">
        </div>
        
        <div class="menu-group">
            <label>TINGKAT KESULITAN (WORD BANK)</label>
            <select id="level-select">
                <option value="easy">LEVEL 1 - 2 (Arcane & Elements)</option>
                <option value="hard">LEVEL 3 (Emotion & Fortitude)</option>
            </select>
        </div>

        <button onclick="startGame()">MASUK ARENA</button>
    </div>

    <div id="game-screen" style="display: none;">
        <div class="battle-view">
            <div>
                <div id="p-name" style="font-weight: bold; font-size: 14px;">PLAYER</div>
                <div class="hp-bar" style="width: 150px;"><div id="p-hp-fill" class="hp-fill" style="background: var(--success); width: 100%;"></div></div>
            </div>
            <div style="align-self: center; font-weight: bold; opacity: 0.5;">VS</div>
            <div>
                <div style="font-weight: bold; color: var(--danger); font-size: 14px;">ARCH-WIZARD</div>
                <div class="hp-bar" style="width: 150px;"><div id="e-hp-fill" class="hp-fill" style="background: var(--danger); width: 100%;"></div></div>
            </div>
        </div>

        <div id="battle-log" class="log">Gunakan mantramu...</div>

        <div class="action-zone">
            <div class="spell-box">
                <div style="font-size: 10px; opacity: 0.6;">SERANGAN</div>
                <div id="atk-word" class="word-target"></div>
                <input type="text" id="atk-input" placeholder="ketik..." autocomplete="off">
            </div>
            <div class="spell-box">
                <div style="font-size: 10px; opacity: 0.6;">PEMULIHAN</div>
                <div id="heal-word" class="word-target"></div>
                <input type="text" id="heal-input" placeholder="ketik..." autocomplete="off">
            </div>
        </div>
        
        <div style="margin-top: 25px; font-size: 14px;">
            SKOR SAAT INI: <span id="score-val" style="color: var(--primary); font-weight: bold;">0</span>
        </div>
    </div>
</div>

<script>
    // Data kata sesuai gambar yang diunggah
    const wordBank = {
        easy: [
            'Ashes', 'Phoenix', 'Flame', 'Cinder', 'Spark', 'Fireball', 'Thunderclap', 'Rumbling', 'Static', 'Voltage',
            'Pegasus', 'Mana', 'Seance', 'Linger', 'Arcane', 'Sorcerer', 'Cleric', 'Enchant', 'Incantation', 'Necromancer',
            'Harpy', 'Dragon', 'Treasure', 'Knowledge', 'Grimoire', 'Eternal', 'Alchemy', 'Archive', 'Invent', 'Curse',
            'Hexblade', 'Cure', 'Oracle', 'Recover', 'Invigorate', 'Mending', 'Rejuvinate', 'Alleviate', 'Ameliorate', 'Scroll'
        ],
        hard: [
            'Determination', 'Love', 'Compassion', 'Cleanse', 'Purify', 'Bless', 'Kindness', 'Emotion', 'Connection', 'Family',
            'Trust', 'Bond', 'Repent', 'Home', 'Nostalgia', 'Faith', 'Reliance', 'Gentleness', 'Fortitude', 'Comfort'
        ]
    };

    // Data Leaderboard Fiktif
    const dummyLeaders = [
        { name: "Salma", score: 850 },
        { name: "Tasya", score: 720 },
        { name: "Kaye", score: 640 },
        { name: "Arkan", score: 510 },
        { name: "Zack", score: 430 }
    ];

    let currentGameWords = [];
    let player = { name: "", hp: 100 };
    let enemy = { hp: 100 };
    let score = 0;
    let isActive = false;

    window.onload = () => {
        renderLeaderboard();
    };

    function renderLeaderboard() {
        const list = document.getElementById('leader-list');
        list.innerHTML = dummyLeaders.map((l, i) => `
            <div class="leader-entry">
                <span>${i+1}. ${l.name}</span>
                <span style="color: var(--primary)">${l.score}</span>
            </div>
        `).join('');
    }

    function startGame() {
        const name = document.getElementById('name-input').value;
        const level = document.getElementById('level-select').value;
        
        if(!name) return alert("Siapa namamu, Ksatria?");

        player.name = name;
        currentGameWords = wordBank[level];
        
        document.getElementById('p-name').innerText = name.toUpperCase();
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';

        initBattle();
    }

    function initBattle() {
        isActive = true;
        refreshWords();
        document.getElementById('atk-input').focus();
        
        // Musuh menyerang otomatis
        setInterval(() => {
            if(isActive) {
                player.hp -= 8;
                updateUI();
                checkDeath();
            }
        }, 4500);
    }

    function refreshWords() {
        document.getElementById('atk-word').innerText = currentGameWords[Math.floor(Math.random() * currentGameWords.length)];
        document.getElementById('heal-word').innerText = currentGameWords[Math.floor(Math.random() * currentGameWords.length)];
    }

    document.getElementById('atk-input').addEventListener('input', function(e) {
        if(!isActive) return;
        if(e.target.value.toLowerCase() === document.getElementById('atk-word').innerText.toLowerCase()) {
            enemy.hp -= 20;
            score += 15;
            e.target.value = "";
            refreshWords();
            updateUI();
            checkDeath();
        }
    });

    document.getElementById('heal-input').addEventListener('input', function(e) {
        if(!isActive) return;
        if(e.target.value.toLowerCase() === document.getElementById('heal-word').innerText.toLowerCase()) {
            player.hp = Math.min(100, player.hp + 12);
            e.target.value = "";
            refreshWords();
            updateUI();
        }
    });

    function updateUI() {
        document.getElementById('p-hp-fill').style.width = player.hp + "%";
        document.getElementById('e-hp-fill').style.width = enemy.hp + "%";
        document.getElementById('score-val').innerText = score;
    }

    function checkDeath() {
        if(enemy.hp <= 0) {
            isActive = false;
            alert("KEMENANGAN TELAK! Skor Akhir: " + score);
            location.reload();
        } else if(player.hp <= 0) {
            isActive = false;
            alert("KEKALAHAN... Coba lagi lain kali.");
            location.reload();
        }
    }
</script>
</body>
</html>
